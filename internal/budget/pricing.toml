# Pricing table for spore budget. Per-million-token rates in USD.
# Sourced from LiteLLM's anthropic.* table (the same source ccusage uses)
# so `spore budget summary` lines up with `ccusage` within rounding.
# Update this file in-tree when Anthropic publishes new model rates;
# spore re-reads it via go:embed at compile time, no Go change needed.

# Unknown models fall back to the pricing entry named here. A new model
# id should overshoot (operator sees pressure) rather than silently
# zero-cost.
fallback = "claude-sonnet-4-6"

